<!-- Botón hamburguesa (solo móvil) -->
<button class="hamburger" (click)="toggleSidebar()">
  <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
  </svg>
</button>

<!-- Overlay -->
@if (sidebarAbierto) {
  <div class="sidebar-overlay" (click)="cerrarSidebar()"></div>
}

<!-- Sidebar -->
<div class="sidebar" [class.abierto]="sidebarAbierto">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>
    <div class="sidebar-title">
      <h2>Bastón IoT</h2>
      <span>Panel Admin</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" (click)="cerrarSidebar()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a class="nav-item" routerLink="/bastones" routerLinkActive="active" (click)="cerrarSidebar()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      <span>Bastones</span>
    </a>

    <a class="nav-item" routerLink="/usuarios" routerLinkActive="active" (click)="cerrarSidebar()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      <span>Usuarios</span>
    </a>

    <a class="nav-item" routerLink="/auditoria" routerLinkActive="active" (click)="cerrarSidebar()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3v2zm-3-7V3.5L18.5 9H13z"/>
      </svg>
      <span>Auditoría</span>
    </a>

    <a class="nav-item" routerLink="/roles" routerLinkActive="active" (click)="cerrarSidebar()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      <span>Roles</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <button class="btn-logout" (click)="cerrarSesion()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
      <span>Cerrar sesión</span>
    </button>
  </div>
</div>
