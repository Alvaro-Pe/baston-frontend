<div class="login-container">
  <div class="login-card">
    <div class="login-left">
      <div class="logo-circle">🦯</div>
      <h1>Bastón IoT</h1>
      <p>Sistema de monitoreo inteligente para bastones de movilidad asistida</p>
    </div>

    <div class="login-right">
      <div class="login-form">
        <h2>Olvidé mi contraseña</h2>
        <p class="subtitle">Ingresa tu email y te enviaremos las instrucciones</p>

        @if (mensaje) {
          <div class="exito-msg">{{ mensaje }}</div>
        }
        @if (error) {
          <div class="error-msg">{{ error }}</div>
        }

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <input type="email" placeholder="Ingresa tu email" [(ngModel)]="email" />
          </div>
        </div>

        <button class="btn-login" (click)="enviarSolicitud()" [disabled]="cargando">
          {{ cargando ? 'Enviando...' : 'Enviar instrucciones' }}
        </button>

        <button class="btn-volver" (click)="volver()">
          ← Volver al login
        </button>
      </div>
    </div>
  </div>
</div>
