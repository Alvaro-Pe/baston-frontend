<div class="login-container">
  <div class="login-card">
    <div class="login-left">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
      </div>
      <h1>Bienvenido</h1>
      <p>Para acceder al sistema por favor inicia sesión con tus datos</p>
    </div>

    <div class="login-right">
      <div class="login-form">
        <h2>Iniciar Sesión</h2>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>

      @if (error) {
  <div class="error-msg">
    <span>{{ error }}</span>
  </div>
}

@if (exito) {
  <div class="exito-msg">
    <span>{{ exito }}</span>
  </div>
}
        <div class="form-group">
          <label>Usuario</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <input type="text" placeholder="Ingresa tu usuario" [(ngModel)]="username" />
          </div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11V12z"/>
            </svg>
            <input type="password" placeholder="Ingresa tu contraseña" [(ngModel)]="password" />
          </div>
        </div>

        <button class="btn-login" (click)="iniciarSesion()" [disabled]="cargando">
          {{ cargando ? 'Cargando...' : 'Iniciar sesión' }}
        </button>
      </div>
    </div>
  </div>
</div>
