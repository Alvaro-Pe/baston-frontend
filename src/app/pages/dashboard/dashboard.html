<div class="dashboard">
  <div class="welcome-card">
    <div class="welcome-content">
      <div class="welcome-text">
        <h2>Bienvenido, Admin</h2>
        <p>Panel principal del sistema Bastón IoT</p>
      </div>
      <div class="welcome-stats">
        <span class="stat-dot online"></span>
        
      </div>
    </div>
    <span class="badge admin">Administrador</span>
  </div>

  <div class="cards-grid">
    <div class="card bastones">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <div class="card-info">
        <span class="card-number">{{ totalBastones }}</span>
        <h3>Bastones activos</h3>
        <span class="card-trend positive">+12%</span>
      </div>
    </div>

    <div class="card usuarios">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
      </div>
      <div class="card-info">
        <span class="card-number">{{ totalUsuarios }}</span>
        <h3>Total usuarios</h3>
        <span class="card-trend positive">+8%</span>
      </div>
    </div>
  </div>
</div>
