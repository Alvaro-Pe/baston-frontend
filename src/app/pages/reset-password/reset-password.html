<div class="login-container">
  <div class="login-card">
    <div class="login-left">
      <div class="logo-circle">🦯</div>
      <h1>Bastón IoT</h1>
      <p>Sistema de monitoreo inteligente para bastones de movilidad asistida</p>
    </div>

    <div class="login-right">
      <div class="login-form">
        <h2>Nueva contraseña</h2>
        <p class="subtitle">Ingresa tu nueva contraseña</p>

        @if (mensaje) {
          <div class="exito-msg">{{ mensaje }}</div>
        }
        @if (error) {
          <div class="error-msg">{{ error }}</div>
        }

        @if (!mensaje) {
          <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password" placeholder="Ingresa tu nueva contraseña" [(ngModel)]="password" />
          </div>

          <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" placeholder="Confirma tu nueva contraseña" [(ngModel)]="confirmar" />
          </div>

          <button class="btn-login" (click)="resetear()" [disabled]="cargando">
            {{ cargando ? 'Actualizando...' : 'Actualizar contraseña' }}
          </button>
        }
      </div>
    </div>
  </div>
</div>
